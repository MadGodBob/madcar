frequency: 30
sensor_timeout: 0.1
two_d_mode: true

# TF frame 名字
map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

publish_tf: true
print_diagnostics: true

# 1) 轮式里程计输入
odom0: /wheel_odom
odom0_queue_size: 10
odom0_differential: false
odom0_relative: false

# 使用 wheel_odom 的哪些字段：
# [x, 	y, 		z, 
#	 roll, 	pitch, 	yaw, 
#	 vx, 	vy, 	vz,  
#	 vroll, vpitch, vyaw, 
#	 ax, 	ay, 	az]
# 这里只使用x y vx
odom0_config: [true,  true, false,
              false, false, false,
              true,  false, false,
              false, false, false,
              false, false, false]

# 2) IMU 输入
imu0: /IMU_data
imu0_queue_size: 50
imu0_differential: false
imu0_relative: false
imu0_remove_gravitational_acceleration: true

# 利用IMU的全部姿态（roll, pitch, yaw）、全部角速度和X/Y轴加速度，但忽略Z轴加速度
imu0_config: [false, false, false,
              true, true, true,
              false, false, false,
              true, true, true,
              false, false, false]